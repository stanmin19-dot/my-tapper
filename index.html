<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Cat Empire: Save Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0a0a0a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            /* Убираем синеву и выделение */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        .header {
            width: 90%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            border-bottom: 2px solid var(--primary);
            border-radius: 0 0 20px 20px;
        }

        .balance { font-size: 32px; font-weight: bold; color: var(--primary); }

        .game-area {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .cat-icon {
            font-size: 60px;
            animation: bounce 2s infinite ease-in-out;
            filter: drop-shadow(0 0 10px var(--secondary));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .shop-btn {
            position: fixed;
            bottom: 30px;
            padding: 15px 45px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            z-index: 1000;
        }

        #shop-overlay {
            position: fixed;
            top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 2000;
            padding-top: 50px;
        }

        .shop-item {
            width: 80%;
            background: rgba(255,255,255,0.1);
            margin: 10px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* Текст при клике */
        .tap-text {
            position: absolute;
            color: var(--primary);
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 0.6s forwards;
        }

        @keyframes moveUp {
            to { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div style="font-size: 10px; color: #888;">КОИНЫ</div>
            <div class="balance" id="score">0</div>
        </div>
        <div style="text-align: right">
            <div id="per-click" style="font-size: 12px;">Клик: 1</div>
            <div id="per-second" style="font-size: 12px;">Авто: 0/с</div>
        </div>
    </div>

    <div class="game-area" id="click-zone">
        <div id="cat-display" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <div class="cat-icon">🐱</div>
        </div>
    </div>

    <button class="shop-btn" onclick="toggleShop()">МАГАЗИН</button>

    <div id="shop-overlay">
        <h1>МАГАЗИН</h1>
        <div class="shop-item">
            <div><b>Сила клика</b><br><small id="c-cost">Цена: 10</small></div>
            <button onclick="buy('click')">КУПИТЬ</button>
        </div>
        <div class="shop-item">
            <div><b>Авто-бот</b><br><small id="a-cost">Цена: 50</small></div>
            <button onclick="buy('auto')">КУПИТЬ</button>
        </div>
        <button class="shop-btn" style="position: static; margin-top: 20px;" onclick="toggleShop()">ЗАКРЫТЬ</button>
        <button onclick="resetGame()" style="margin-top: 50px; background: none; border: 1px solid red; color: red; padding: 5px;">СБРОСИТЬ ПРОГРЕСС</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // --- ЛОГИКА СОХРАНЕНИЯ ---
        let rawData = localStorage.getItem('myTapperData');
        let data = rawData ? JSON.parse(rawData) : {
            score: 0,
            clickPower: 1,
            autoIncome: 0,
            costs: { click: 10, auto: 50 }
        };

        function save() {
            localStorage.setItem('myTapperData', JSON.stringify(data));
        }

        function resetGame() {
            if(confirm("Реально хочешь всё удалить?")) {
                localStorage.removeItem('myTapperData');
                location.reload();
            }
        }
        // -------------------------

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(data.score);
            document.getElementById('per-click').innerText = "Клик: " + data.clickPower;
            document.getElementById('per-second').innerText = "Авто: " + data.autoIncome + "/с";
            document.getElementById('c-cost').innerText = "Цена: " + data.costs.click;
            document.getElementById('a-cost').innerText = "Цена: " + data.costs.auto;
            
            // Обновляем визуально котов
            const container = document.getElementById('cat-display');
            container.innerHTML = '';
            for(let i=0; i < Math.min(data.clickPower, 20); i++) {
                container.innerHTML += '<div class="cat-icon">🐱</div>';
            }
        }

        document.getElementById('click-zone').onclick = (e) => {
            data.score += data.clickPower;
            updateUI();
            save();
            tg.HapticFeedback.impactOccurred('light');
            
            // Текст при клике
            let txt = document.createElement('div');
            txt.className = 'tap-text';
            txt.innerText = "+" + data.clickPower;
            txt.style.left = e.clientX + "px";
            txt.style.top = e.clientY + "px";
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 600);
        };

        function buy(type) {
            if(data.score >= data.costs[type]) {
                data.score -= data.costs[type];
                if(type === 'click') {
                    data.clickPower++;
                    data.costs.click = Math.floor(data.costs.click * 2);
                } else {
                    data.autoIncome++;
                    data.costs.auto = Math.floor(data.costs.auto * 1.8);
                }
                updateUI();
                save();
            }
        }

        function toggleShop() {
            let s = document.getElementById('shop-overlay');
            s.style.display = s.style.display === 'flex' ? 'none' : 'flex';
        }

        // Пассивный доход
        setInterval(() => {
            if(data.autoIncome > 0) {
                data.score += data.autoIncome;
                updateUI();
                save();
            }
        }, 1000);

        updateUI(); // Загрузить данные при старте
    </script>
</body>
</html>
