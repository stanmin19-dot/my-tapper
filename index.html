<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: radial-gradient(circle, #2c3e50, #000000);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #coin {
            width: 200px;
            height: 200px;
            background: linear-gradient(145deg, #f1c40f, #d4ac0d);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(241, 196, 15, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        #coin:active {
            transform: scale(0.95);
        }
        .score {
            font-size: 32px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="score">Баланс: <span id="balance">0</span> 🐹</div>
    <div id="coin">💰</div>

    <script>
        let tg = window.Telegram.WebApp;
        let score = 0;
        let balanceEl = document.getElementById('balance');
        let coin = document.getElementById('coin');

        tg.expand(); // Разворачиваем на весь экран

        coin.onclick = function() {
            score++;
            balanceEl.innerText = score;
            tg.HapticFeedback.impactOccurred('medium'); // Вибрация при тапе!
        };
    </script>
</body>
</html>
