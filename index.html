<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>CAT EMPIRE: PC & MOBILE EDITION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --p-color: #00f2fe;
            --s-color: #4facfe;
            --accent: #f093fb;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* Шапка */
        .top-bar {
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        .balance-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-main {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0,242,254,0.5));
        }

        /* Зона клика */
        .click-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .main-object {
            width: 250px; height: 250px;
            position: relative;
            cursor: pointer;
            transition: transform 0.05s;
        }

        .main-object:active { transform: scale(0.92); }

        .object-emoji {
            font-size: 150px;
            z-index: 2;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        /* Меню Навигации */
        .nav-menu {
            height: 80px;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
        }

        .nav-item {
            cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            color: #666; font-size: 11px;
        }

        .nav-item.active { color: var(--p-color); }
        .nav-icon { font-size: 24px; }

        /* ОВЕРЛЕИ (Магазин и Скины) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .overlay-content {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px 20px;
            height: 100%;
            overflow-y: auto;
            position: relative;
        }

        /* Кнопка Закрыть (Специально для ПК) */
        .close-area-btn {
            position: sticky;
            top: 0;
            align-self: flex-end;
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1100;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        .shop-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-info { flex: 1; margin-left: 15px; }
        .card-price { color: var(--p-color); font-weight: bold; }

        .buy-btn {
            background: var(--p-color);
            color: black;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .buy-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* Эффект частиц */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: particleOut 0.8s forwards;
            font-size: 24px;
            z-index: 100;
        }

        @keyframes particleOut {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body id="game-body">

<div class="top-bar">
    <div class="balance-row">
        <div>
            <div style="font-size: 10px; color: #888;">COINS</div>
            <div id="balance" class="balance-main">0</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 10px; color: #888;">AUTO-INCOME</div>
            <div id="per-sec-val" style="color: #00f2fe; font-size: 16px;">+0/s</div>
        </div>
    </div>
</div>

<div class="click-container" id="tap-zone">
    <div class="main-object" id="object-trigger">
        <div class="object-emoji animate__animated" id="main-emoji">🐱</div>
    </div>
</div>

<div class="nav-menu">
    <div class="nav-item active" onclick="closeAll()">
        <div class="nav-icon">🏠</div>
        GAME
    </div>
    <div class="nav-item" onclick="openOverlay('shop')">
        <div class="nav-icon">⚡</div>
        SHOP
    </div>
    <div class="nav-item" onclick="openOverlay('skins')">
        <div class="nav-icon">🎭</div>
        SKINS
    </div>
</div>

<div id="shop-overlay" class="overlay" onclick="handleOutsideClick(event)">
    <div class="overlay-content">
        <button class="close-area-btn" onclick="closeAll()">ЗАКРЫТЬ ✕</button>
        <h2 style="margin-top:0">UPGRADES</h2>
        <div id="shop-list"></div>
    </div>
</div>

<div id="skins-overlay" class="overlay" onclick="handleOutsideClick(event)">
    <div class="overlay-content">
        <button class="close-area-btn" onclick="closeAll()">ЗАКРЫТЬ ✕</button>
        <h2>CHOOSE HERO</h2>
        <div id="skins-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let state = JSON.parse(localStorage.getItem('cat_empire_v3')) || {
        coins: 0,
        clickPower: 1,
        income: 0,
        currentSkin: '🐱',
        upgrades: {
            clicker: { level: 1, cost: 15, power: 1 },
            bot: { level: 0, cost: 100, income: 2 }
        },
        skins: ['🐱']
    };

    const skinsLibrary = [
        { char: '🐱', price: 0 }, { char: '🐹', price: 500 },
        { char: '🦊', price: 2000 }, { char: '🦁', price: 10000 },
        { char: '🐲', price: 50000 }, { char: '🦄', price: 100000 }
    ];

    function save() { localStorage.setItem('cat_empire_v3', JSON.stringify(state)); }

    // Клик
    document.getElementById('tap-zone').onclick = (e) => {
        state.coins += state.clickPower;
        spawnParticle(e.clientX, e.clientY);
        updateUI();
        save();
        tg.HapticFeedback.impactOccurred('medium');
    };

    function spawnParticle(x, y) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = state.currentSkin;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        const tx = (Math.random() - 0.5) * 200;
        const ty = (Math.random() - 0.5) * 200 - 100;
        p.style.setProperty('--x', tx + 'px');
        p.style.setProperty('--y', ty + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('per-sec-val').innerText = `+${state.income}/s`;
        document.getElementById('main-emoji').innerText = state.currentSkin;
        renderShop();
        renderSkins();
    }

    function renderShop() {
        const list = document.getElementById('shop-list');
        list.innerHTML = '';
        Object.keys(state.upgrades).forEach(key => {
            const up = state.upgrades[key];
            const div = document.createElement('div');
            div.className = 'shop-card';
            div.innerHTML = `
                <div style="font-size:30px">${key === 'clicker' ? '🖱️' : '🤖'}</div>
                <div class="card-info">
                    <b>${key.toUpperCase()} (LVL ${up.level})</b><br>
                    <span class="card-price">COST: ${up.cost}</span>
                </div>
                <button class="buy-btn" ${state.coins < up.cost ? 'disabled' : ''} onclick="buy('${key}')">BUY</button>
            `;
            list.appendChild(div);
        });
    }

    function renderSkins() {
        const list = document.getElementById('skins-list');
        list.innerHTML = '';
        skinsLibrary.forEach(s => {
            const owned = state.skins.includes(s.char);
            const div = document.createElement('div');
            div.className = 'shop-card';
            div.style.flexDirection = 'column';
            div.innerHTML = `
                <div style="font-size:40px">${s.char}</div>
                <div style="margin:10px 0">${owned ? 'OWNED' : s.price}</div>
                <button class="buy-btn" style="width:100%" ${!owned && state.coins < s.price ? 'disabled' : ''} onclick="skinAction('${s.char}', ${s.price})">
                    ${owned ? (state.currentSkin === s.char ? 'ACTIVE' : 'SELECT') : 'BUY'}
                </button>
            `;
            list.appendChild(div);
        });
    }

    function buy(key) {
        const up = state.upgrades[key];
        if (state.coins >= up.cost) {
            state.coins -= up.cost;
            up.level++;
            if (key === 'clicker') state.clickPower += 1;
            else state.income += up.income;
            up.cost = Math.floor(up.cost * 1.8);
            updateUI();
            save();
        }
    }

    function skinAction(char, price) {
        if (state.skins.includes(char)) { state.currentSkin = char; }
        else if (state.coins >= price) { state.coins -= price; state.skins.push(char); state.currentSkin = char; }
        updateUI();
        save();
    }

    // НАВИГАЦИЯ
    function openOverlay(id) {
        document.getElementById(id + '-overlay').style.display = 'flex';
    }

    function closeAll() {
        document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
    }

    // Закрытие по клику вне контента
    function handleOutsideClick(event) {
        if (event.target.classList.contains('overlay')) {
            closeAll();
        }
    }

    // Авто-доход
    setInterval(() => {
        if (state.income > 0) {
            state.coins += state.income / 10;
            updateUI();
        }
    }, 100);

    updateUI();
</script>

</body>
</html>
